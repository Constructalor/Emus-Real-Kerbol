@Kopernicus:AFTER[Kopernicus]
{
    @Body[Mun] 
    {
        @Properties
        {
            //displayName = Kerbol^N
            description = Kerbin's companion body is a prime destination for early space missions. Throughout history, Kerbalkind has gazed at and worshipped the Mun, wishing to visit there someday. With the advancements in space travel, that wish is now reality. \n\nExplore the scars of impacts and ancient tectonic activity, or give a brief hello as you slingshot past it into the rest of the system.
        }
    }
}