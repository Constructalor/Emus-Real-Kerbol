@Kopernicus:AFTER[Kopernicus]
{
    @Body[Mun] 
    {
        @Properties
        {
            radius = 1985000
            geeASL = 0.18
            //displayName = Kerbol^N
            description = Kerbin's companion body is a prime destination for early space missions. Throughout history, Kerbalkind has gazed at and worshipped the Mun, wishing to visit there someday. With advancements in space travel, we can make that wish a reality. \n\nExplore the scars of impacts and ancient tectonic activity, or give a brief hello as you slingshot past it into the rest of the system.
        }
        @Orbit
        {
            @referenceBody = Kerbin
            inclination = 0.5
            eccentricity = 0.02
            semiMajorAxis = 180000000
            longitudeOfAscendingNode = 223
            argumentOfPeriapsis = 0
            meanAnomalyAtEpoch = 0
            // epoch = 4
            // color = 0.788, 0.788, 0.788, 1.000
        }
    }
}