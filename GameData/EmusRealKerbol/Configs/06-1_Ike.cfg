@Kopernicus:AFTER[Kopernicus]
{
    @Body[Ike] 
    {
        @Properties
        {
            radius = 1311000
            geeASL = 0.12
            //displayName = Kerbol^N
            description = Ike loves visitors, even when said visitors were planning to go to Duna. Its relatively large SOI, lack of atmosphere, and geostationary orbit make it a breeze to bump into this tidally-locked moon. \n\nIf you find yourself crashing there, let us know. We'd love more data on Ike's dormant stratovolcanoes and mostly untouched ashfall regions. Oh, and we'll set up a rescue operation.
        }
        @Orbit
        {
            @referenceBody = Duna
            inclination = 2
            eccentricity = 0.02
            semiMajorAxis = 33700000
            longitudeOfAscendingNode = 88
            argumentOfPeriapsis = 325
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.631, 0.565, 0.514, 1.000
        }
    }
}