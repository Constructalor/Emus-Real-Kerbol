@Kopernicus:AFTER[Kopernicus]
{
    @Body[Eve] 
    {
        @Properties
        {
            //displayName = Kerbol^N
            description = Eve is the brightest planet visible from Kerbin and gets its name from being known as the "evening star". This brightness is thanks to its proximity to Kerbol, as well as its thick cover of lilac clouds. \n\nHowever, beneath these calm clouds is the hottest, most hellish terrestrial environment in the Kerbolar system. The crushing gravity and high-pressure atmosphere guarantees that any ill-prepared mission will become a one-way trip.
        }
    }
}