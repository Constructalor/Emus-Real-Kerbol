@Kopernicus:AFTER[Kopernicus]
{
    @Body[Jool] 
    {
        @Properties
        {
            //displayName = Kerbol^N
            description = The giant planet Jool has been worshipped by Kerbalkind throughout history as "that big bright thing that moves sometimes". It is mostly gaseous and has a massive gravitational pull compared to the other planets. \n\nThere is no solid surface here and the pressure below the clouds will obliterate any craft that enters, but its swirling storms and vibrant red bands are ripe for study and watercolor paintings.
        }
    }
}