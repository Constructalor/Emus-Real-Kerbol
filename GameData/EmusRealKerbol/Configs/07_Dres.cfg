@Kopernicus:AFTER[Kopernicus]
{
    @Body[Dres] 
    {
        @Properties
        {
            radius = 1381000
            geeASL = 0.11
            //displayName = Kerbol^N
            description = A dwarf planet, Dres has the gravitational pull to round itself out as it orbits the sun, but it doesn't rule its inclined, eccentric orbit like a proper planet. It is content to 'hang out' with other space objects, rather than tell them to become moons or get lost. \n\nDres is also home to a lovely ring system and rad equatorial ridge! How unique!
        }
        @Orbit
        {
            @referenceBody = Sun
            inclination = 8
            eccentricity = 0.15
            semiMajorAxis = 343000000000
            longitudeOfAscendingNode = 177
            argumentOfPeriapsis = 104
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.651, 0.647, 0.588, 1.000
        }
    }
}