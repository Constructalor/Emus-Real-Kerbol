@Kopernicus:AFTER[Kopernicus]
{
    @Body[Bop] 
    {
        @Properties
        {
            radius = 616000
            geeASL = 0.028
            //displayName = Kerbol^N
            description = What, did Bop cross your path? You might hear this after waking up on the wrong side of the bed. Kerbalkind says this bashed moon is the home of the infamous Kraken! The large impact craters, one of which taking up over a sixth of the surface, are likely the root of this association with the ship-ravaging rumor. \n\nThis lore, along with Bop's low gravity makes this cratered moon a haven for Kraken covens and skateboarding tournaments alike.
        }
        @Orbit
        {
            @referenceBody = Jool
            inclination = 22
            eccentricity = 0.1
            semiMajorAxis = 1760000000
            longitudeOfAscendingNode = 201
            argumentOfPeriapsis = 222
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.58, 0.561, 0.545, 1.000
        }
    }
}