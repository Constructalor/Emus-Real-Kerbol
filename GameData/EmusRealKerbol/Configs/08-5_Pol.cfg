@Kopernicus:AFTER[Kopernicus]
{
    @Body[Pol] 
    {
        @Properties
        {
            radius = 512000
            geeASL = 0.031
            //displayName = Kerbol^N
            description = Jool's smallest moon is bursting with geothermal activity! Sulfur compounds spew from volcanoes while deposits of sulfur dioxide ices create small spires along the surface. \n\nPol's bright yellow appearance and spiky terrain give it a "don't come near me" vibe. We've also picked up intense radiation around its orbit, so maybe Pol really doesn't want us around.
        }
        @Orbit
        {
            @referenceBody = Jool
            inclination = 5
            eccentricity = 0.2
            semiMajorAxis = 2950000000
            longitudeOfAscendingNode = 0
            argumentOfPeriapsis = 0
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.698, 0.749, 0.325, 1.000
        }
    }
}