@Kopernicus:AFTER[Kopernicus]
{
    @Body[Minmus] 
    {
        @Properties
        {
            //displayName = Kerbol^N
            description = Kerbin's "second moon," Minmus has an unusual path around Kerbol, synchronized with Kerbin's orbit. This gives the illusion from our perspective that it orbits Kerbin, making it a quasi-moon. \n\nDespite the challenge of visiting it, scientists were eager to study Minmus' geology, especially after seeing its impossible, ice-like surface. Further analysis led researchers to conclude that the "ice" is actually glass, much to the dismay of Minmus' Mystic Crunch Milkshakes.
        }
    }
}