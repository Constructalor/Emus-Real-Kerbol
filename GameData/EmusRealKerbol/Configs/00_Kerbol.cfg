@Kopernicus:AFTER[Kopernicus]
{
    @Body[Sun] 
    {
        @Properties
        {
            displayName = Kerbol^N
            description = The object so iconic, only the coolest beings revolve around it! This enormous glowing orb of plasma is one-hundred times larger than Kerbin, and its mass creates the gravitational well which houses its eight planets, their respective moons, minor planets and more. Despite its mesmerizing aura, Kerbal Space Program's Legal Welfare Team would like to take this moment to remind you: do not stare at the sun.
        }
    }
}