@Kopernicus:AFTER[Kopernicus]
{
    @Body[Kerbin] 
    {
        @Properties
        {
            radius = 5992000
            geeASL = 1.28
            //displayName = Kerbol^N
            description = Even as kerbalkind reaches for the stars, there is still so much to admire about our home planet, Kerbin. Lying in Kerbol's Goldilocks zone, Kerbin is at just the right temperature to sustain complex life. Its vast oceans, deserts, forests and plains coat the surface in lively beauty. \n\nWe owe a lot to this blue marble and are fortunate to call it our home.
        }
        @Orbit
        {
            @referenceBody = Sun
            inclination = 0
            eccentricity = 0.001
            semiMajorAxis = 136000000000
            longitudeOfAscendingNode = 182
            argumentOfPeriapsis = 126
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.333, 0.565, 0.911, 1.000
        }
    }
}