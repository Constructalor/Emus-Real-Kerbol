@Kopernicus:AFTER[Kopernicus]
{
    @Body[Eeloo] 
    {
        @Properties
        {
            //displayName = Kerbol^N
            description = Eeloo seems to enjoy its lonely, highly-eccentric orbit that sees it pass from Juni's orbit all the way out past Xerox. This isolated ice world sees some extreme seasonal changes in temperature. The icy surface expands and contracts throughout the year, revealing the planet's interior and possibly vital resources. \n\nMissions here are quite costly, given the low gravity, wacky orbit and spotty solar power potential. Even so, it is worth the struggle to see the frozen cliffs up close!
        }
    }
}