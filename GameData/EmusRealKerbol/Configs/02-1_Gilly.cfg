@Kopernicus:AFTER[Kopernicus]
{
    @Body[Gilly] 
    {
        @Properties
        {
            radius = 131000
            geeASL = 0.005
            //displayName = Kerbol^N
            description = Gilly took years to be officially discovered due to its resemblance  to a crumb on the telescope lens throwing off astronomers. Its gentle gravity often leads to objects bouncing off its surface and back into orbit around Eve. \n\nPlease be cautious when taking brisk walks.
        }
        @Orbit
        {
            @referenceBody = Eve
            inclination = 5
            eccentricity = 0.52
            semiMajorAxis = 356000000
            longitudeOfAscendingNode = 158
            argumentOfPeriapsis = 50
            meanAnomalyAtEpoch = -55
            // epoch = 4
            color = 0.529, 0.506, 0.439, 1.000
        }
    }
}