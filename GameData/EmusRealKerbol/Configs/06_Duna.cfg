@Kopernicus:AFTER[Kopernicus]
{
    @Body[Duna] 
    {
        @Properties
        {
            radius = 3456000
            geeASL = 0.37
            //displayName = Kerbol^N
            description = Duna, the "red planet," has long been an object of study and inspiration to kerbal scientists and artists alike! Its thin, low-pressure atmosphere allows for both aerobraking and easy descents. \n\nKerbal researches and sci-fi writers often discuss the discoveries that could be waiting for them in the planet's polar ice caps or on Duna's tidally locked moon, Ike.
        }
        @Orbit
        {
            @referenceBody = Sun
            inclination = 1
            eccentricity = 0.08
            semiMajorAxis = 196000000000
            longitudeOfAscendingNode = 0
            argumentOfPeriapsis = 359
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.899, 0.584, 0.361, 1.000
        }
    }
}