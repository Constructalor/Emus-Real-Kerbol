@Kopernicus:AFTER[Kopernicus]
{
    @Body[Vall] 
    {
        @Properties
        {
            radius = 1540000
            geeASL = 0.14
            //displayName = Kerbol^N
            description = Vall, "The frozen wonderland," is the second moon of Jool. The white icy surface covers a massive underground water ocean, which occasionally bubbles out of its many cryovolcanoes. \n\nThe side that faces Jool is warmed by radiation, causing it to erode slightly, exposing deeper layers of the icy crust. If the discrepancy between ship-skewering mountains and smooth shiny terrain has puzzled you in the past, now you know!
        }
        @Orbit
        {
            @referenceBody = Jool
            inclination = 5
            eccentricity = 0.01
            semiMajorAxis = 503000000
            longitudeOfAscendingNode = 0
            argumentOfPeriapsis = 0
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.749, 0.792, 0.811, 1.000
        }
    }
}