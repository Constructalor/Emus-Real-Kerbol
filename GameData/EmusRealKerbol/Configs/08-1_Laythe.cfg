@Kopernicus:AFTER[Kopernicus]
{
    @Body[Laythe] 
    {
        @Properties
        {
            radius = 3840000
            geeASL = 0.53
            //displayName = Kerbol^N
            description = Do you enjoy gleaming oceans, sandy beaches and breathable air, but are also bothered by Kerbin's empty skies? Pack your bags and take a trip to the jewel of the Jool system, Laythe! This oceanic moon undergoes immense tidal forces as it orbits Jool, making it the most geologically active object in the Kerbolar system. This along with an abundance of salt allows it to sustain its iconic water oceans and oxygen atmosphere. This atmosphere also acts as a shield from Jool's radiation belts. \n\nIf it ever feels too familiar, simply gaze upwards as Jool fills the sky with color.
        }
        @Orbit
        {
            @referenceBody = Jool
            inclination = 5
            eccentricity = 0.005
            semiMajorAxis = 244000000
            longitudeOfAscendingNode = 0
            argumentOfPeriapsis = 0
            meanAnomalyAtEpoch = 0
            // epoch = 4
            color = 0.455, 0.816, 0.871, 1.000
        }
    }
}