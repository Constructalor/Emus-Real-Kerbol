@Kopernicus:AFTER[Kopernicus]
{
    @Body[Tylo] 
    {
        @Properties
        {
            //displayName = Kerbol^N
            description = If you want to visit the Jool system, you'll need to know about Tylo. Despite being relatively small, it is extremely dense, having the better part of Kerbin's gravity. This makes it perfect for gravity assists when entering and exiting the Joolian system, saving on lots of fuel. \n\nTylo's thin atmosphere won't help much if you want to land here so pack a lot of fuel.
        }
    }
}