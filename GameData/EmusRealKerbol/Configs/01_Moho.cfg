@Kopernicus:AFTER[Kopernicus]
{
    @Body[Moho] 
    {
        @Properties
        {
            radius = 2616000
            geeASL = 0.42
            //displayName = Kerbol^N
            description = Most Moho missions crumble early on because of the logistics. It zips along an inclined, eccentric orbit, making interception a nightmare. If you make it into Moho's SOI, there's no atmosphere for aerobraking, and there are severe temperature variations between the day and night side, due to its 3:2 spin-orbit resonance. \n\nBut imagine beholding those craters in person!
        }
        @Orbit
        {
            @referenceBody = Sun
            inclination = 7
            eccentricity = 0.2
            semiMajorAxis = 52600000000
            longitudeOfAscendingNode = 70
            argumentOfPeriapsis = 15
            meanAnomalyAtEpoch = 116
            // epoch = 4
            color = 0.631, 0.545, 0.518, 1.000
        }
    }
}